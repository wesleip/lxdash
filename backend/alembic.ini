# =============================================================================
# Alembic configuration for lxdash backend
# =============================================================================
# Run migrations from the backend/ directory:
#   cd backend && alembic upgrade head

[alembic]
# Path to the migration scripts directory (relative to this file).
script_location = migrations

# sqlalchemy.url is overridden at runtime from settings.DATABASE_URL in env.py.
# The value below is only a fallback so that `alembic --help` doesn't error.
sqlalchemy.url = sqlite:///./lxdash.db

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the date in file_template
timezone = UTC

# Output encoding for migration scripts
output_encoding = utf-8

[post_write_hooks]
# Optionally run Black/ruff on generated migration files:
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
